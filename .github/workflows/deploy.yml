name: Deploy Lumis Admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAME: lumis-admin
      APP_DIR: /var/www/lumis-admin
      DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
      DROPLET_USER: ${{ secrets.DROPLET_USER }}
      DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      REVENUECAT_WEBHOOK_KEY: ${{ secrets.REVENUECAT_WEBHOOK_KEY }}

    steps:
      - name: Configure SSH
        run: |
          set -euo pipefail
          echo "Configuring SSH for droplet deploy"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DROPLET_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 -H "$DROPLET_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on droplet
        run: |
          set -euo pipefail
          echo "Deploying lumis-admin to $DROPLET_HOST"
          SUPABASE_URL_B64="$(printf '%s' "$SUPABASE_URL" | base64 | tr -d '\n')"
          SUPABASE_SERVICE_ROLE_KEY_B64="$(printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | base64 | tr -d '\n')"
          ADMIN_PASSWORD_B64="$(printf '%s' "$ADMIN_PASSWORD" | base64 | tr -d '\n')"
          REVENUECAT_WEBHOOK_KEY_B64="$(printf '%s' "$REVENUECAT_WEBHOOK_KEY" | base64 | tr -d '\n')"
          ssh -p 22 "$DROPLET_USER@$DROPLET_HOST" <<EOF
          set -euo pipefail
          echo "Connected to server"
          cd "$APP_DIR"
          echo "Working directory: $APP_DIR"

          if [ ! -d .git ]; then
            echo "Expected a git checkout at $APP_DIR" >&2
            exit 1
          fi

          echo "Pulling latest changes"
          git pull --ff-only origin main
          echo "Installing dependencies"
          npm install
          export NODE_ENV=production
          export SUPABASE_URL="$(printf '%s' '$SUPABASE_URL_B64' | base64 --decode)"
          export SUPABASE_SERVICE_ROLE_KEY="$(printf '%s' '$SUPABASE_SERVICE_ROLE_KEY_B64' | base64 --decode)"
          export ADMIN_PASSWORD="$(printf '%s' '$ADMIN_PASSWORD_B64' | base64 --decode)"
          export REVENUECAT_WEBHOOK_KEY="$(printf '%s' '$REVENUECAT_WEBHOOK_KEY_B64' | base64 --decode)"
          echo "Building application"
          npm run build

          if pm2 describe "$APP_NAME" >/dev/null 2>&1; then
            echo "Restarting existing PM2 app: $APP_NAME"
            pm2 restart ecosystem.config.js --only "$APP_NAME" --update-env
          else
            echo "Starting new PM2 app: $APP_NAME"
            pm2 start ecosystem.config.js --only "$APP_NAME"
          fi

          echo "Saving PM2 process list"
          pm2 save
          echo "Deployment complete"
          EOF
